<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10th Grade English Quiz</title>
<style>
body{font-family:Arial;background:#eef2f7;text-align:center;}
.container{max-width:700px;margin:auto;background:white;padding:20px;margin-top:40px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,0.2);}
button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px;background:#2563eb;color:white;font-size:16px;cursor:pointer;}
button:hover{background:#1d4ed8;}
h1{color:#1e3a8a;}
</style>
</head>
<body>

<div class="container">
<h1>English Quiz</h1>
<div id="menu"></div>
<h2 id="question"></h2>
<div id="answers"></div>
<h3 id="score"></h3>
</div>

<script>
const topics = {
Environment: ["pollution-Kirlilik","nature-Doğa","recycle-Geri dönüştürmek","forest-Orman","climate-İklim"],
Technology: ["computer-Bilgisayar","internet-İnternet","software-Yazılım","hardware-Donanım","robot-Robot"],
Tourism: ["hotel-Otel","ticket-Bilet","travel-Seyahat","guide-Rehber","passport-Pasaport"],
Traditions: ["culture-Kültür","tradition-Gelenek","custom-Adet","festival-Festival","heritage-Miras"],
Science: ["experiment-Deney","energy-Enerji","gravity-Yer çekimi","atom-Atom","molecule-Molekül"],
Movies: ["actor-Oyuncu","director-Yönetmen","scene-Sahne","film-Film","camera-Kamera"],
Jobs: ["doctor-Doktor","teacher-Öğretmen","engineer-Mühendis","nurse-Hemşire","pilot-Pilot"],
Nature: ["river-Nehir","mountain-Dağ","sea-Deniz","animal-Hayvan","plant-Bitki"],
Food: ["bread-Ekmek","milk-Süt","apple-Elma","meat-Et","vegetable-Sebze"],
Daily: ["school-Okul","book-Kitap","pen-Kalem","friend-Arkadaş","family-Aile"]
};

let quiz=[],index=0,score=0;

function generate(topic){
let base=topics[topic];
let q=[];
for(let i=0;i<50;i++){
let item=base[i%base.length];
let p=item.split("-");
q.push({
question:`"${p[0]}" meaning?`,
answer:p[1],
options:[p[1],"A","B","C"].sort(()=>Math.random()-0.5)
});
}
return q;
}

function loadMenu(){
let menu=document.getElementById("menu");
menu.innerHTML="<h3>Choose Topic</h3>";
Object.keys(topics).forEach(t=>{
let b=document.createElement("button");
b.innerText=t;
b.onclick=()=>{quiz=generate(t);index=0;score=0;show();};
menu.appendChild(b);
});
}

function show(){
document.getElementById("menu").style.display="none";
if(index>=quiz.length){
document.getElementById("question").innerHTML="Finished!";
document.getElementById("answers").innerHTML="";
document.getElementById("score").innerHTML=`Score: ${score}/${quiz.length}`;
return;
}
let q=quiz[index];
document.getElementById("question").innerHTML=`${index+1}/50 ${q.question}`;
let a=document.getElementById("answers");
a.innerHTML="";
q.options.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=()=>{if(o===q.answer)score++;index++;show();};
a.appendChild(b);
});
}

loadMenu();
</script>

</body>
</html>
